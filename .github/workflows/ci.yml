name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commit identity
        env:
          ALLOWED_NAME: rendotdev
          ALLOWED_EMAIL: 294850895+rendotdev@users.noreply.github.com
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          zero_sha="0000000000000000000000000000000000000000"

          if [[ -n "${PR_HEAD_SHA:-}" ]]; then
            range="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [[ "${BEFORE_SHA:-}" == "$zero_sha" || -z "${BEFORE_SHA:-}" ]]; then
            range="$HEAD_SHA"
          else
            range="${BEFORE_SHA}..${HEAD_SHA}"
          fi

          for commit in $(git rev-list "$range"); do
            author_name="$(git show -s --format='%an' "$commit")"
            author_email="$(git show -s --format='%ae' "$commit")"
            committer_name="$(git show -s --format='%cn' "$commit")"
            committer_email="$(git show -s --format='%ce' "$commit")"

            if [[ "$author_name" != "$ALLOWED_NAME" || "$author_email" != "$ALLOWED_EMAIL" || "$committer_name" != "$ALLOWED_NAME" || "$committer_email" != "$ALLOWED_EMAIL" ]]; then
              echo "Commit $commit has an invalid identity." >&2
              echo "author: $author_name <$author_email>" >&2
              echo "committer: $committer_name <$committer_email>" >&2
              exit 1
            fi
          done

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
