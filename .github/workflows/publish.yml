name: Publish npm package

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Check published version
        id: published_version
        run: |
          set -euo pipefail
          package_name="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")"
          package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${package_name}@${package_version} is already published. Skipping npm publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack dry run
        if: steps.published_version.outputs.already_published != 'true'
        run: npm pack --dry-run

      - name: Publish with trusted publishing
        if: steps.published_version.outputs.already_published != 'true'
        run: |
          unset NODE_AUTH_TOKEN
          npm publish --access public
